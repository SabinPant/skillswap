name: skillswap

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: skillswap
      POSTGRES_USER: skillswap
      POSTGRES_PASSWORD: skillswap_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  server:
    build:
      context: ../server/laravel
      dockerfile: ../../docker/Dockerfile.server
    ports:
      - "8000:8000"
    env_file:
      - ../server/laravel/.env
    depends_on:
      - postgres
      - redis
      - mailhog
    volumes:
      - ../server/laravel:/var/www/html

  queue-worker:
    build:
      context: ../server/laravel
      dockerfile: ../../docker/Dockerfile.server
    command: php artisan queue:work --sleep=3 --tries=3
    env_file:
      - ../server/laravel/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ../server/laravel:/var/www/html
    restart: unless-stopped

  reverb:
    build:
      context: ../server/laravel
      dockerfile: ../../docker/Dockerfile.server
    command: php artisan reverb:start --host=0.0.0.0
    ports:
      - "8080:8080"
    env_file:
      - ../server/laravel/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ../server/laravel:/var/www/html

  client:
    build:
      context: ../client/nextjs
      dockerfile: ../../docker/Dockerfile.client
    ports:
      - "3000:3000"
    env_file:
      - ../client/nextjs/.env.local
    depends_on:
      - server
    volumes:
      - ../client/nextjs:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data: