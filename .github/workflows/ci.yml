name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

  env:
    DB_HOST: localhost
    REDIS_HOST: localhost

  defaults:
    run:
    working-directory: server/laravel

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: skillswap_test
          POSTGRES_USER: skillswap
          POSTGRES_PASSWORD: skillswap_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pgsql, redis, bcmath

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create .env
        run: |
          cp .env.testing .env
          echo "DB_HOST=localhost" >> .env
          echo "REDIS_HOST=localhost" >> .env
          php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --database=testing

      - name: Run tests
        run: php artisan test
